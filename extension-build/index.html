<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sidebar Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
/* ============================================================================
   AI Sidebar — Modern UI
   Theme-able via [data-theme="light|dark"] on <html>. Fully responsive ≥320px.
   ========================================================================== */

:root {
    /* Brand */
    --brand-1: #6366f1;
    --brand-2: #8b5cf6;
    --brand-3: #ec4899;
    --gradient: linear-gradient(135deg, var(--brand-1), var(--brand-2));
    --gradient-soft: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(139, 92, 246, 0.12));

    /* Radii / motion */
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
    --r-xl: 22px;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ---- Light theme (default) ---- */
:root,
[data-theme="light"] {
    --bg: #ffffff;
    --bg-grad: radial-gradient(1200px 400px at 100% -10%, rgba(139, 92, 246, 0.07), transparent 60%),
               radial-gradient(900px 360px at -10% 0%, rgba(99, 102, 241, 0.07), transparent 55%);
    --surface: #f4f5f7;
    --surface-2: #eceef1;
    --elevated: #ffffff;
    --border: #e7e8ec;
    --border-strong: #d7d9df;
    --text: #0f1222;
    --text-muted: #6b7280;
    --text-faint: #9ca3af;
    --assistant-bubble: #f1f2f5;
    --assistant-text: #14161f;
    --shadow: 0 10px 30px -12px rgba(20, 22, 40, 0.22);
    --shadow-sm: 0 2px 8px -2px rgba(20, 22, 40, 0.12);
    --ring: rgba(99, 102, 241, 0.18);
    --scroll: #d3d5dc;
}

/* ---- Dark theme ---- */
[data-theme="dark"] {
    --bg: #0c0e14;
    --bg-grad: radial-gradient(1200px 420px at 100% -10%, rgba(139, 92, 246, 0.16), transparent 60%),
               radial-gradient(900px 380px at -10% 0%, rgba(99, 102, 241, 0.14), transparent 55%);
    --surface: #161922;
    --surface-2: #1d212c;
    --elevated: #141722;
    --border: #242836;
    --border-strong: #313646;
    --text: #e9ebf2;
    --text-muted: #9aa1b3;
    --text-faint: #6b7282;
    --assistant-bubble: #1b1f2a;
    --assistant-text: #e6e8f0;
    --shadow: 0 16px 40px -16px rgba(0, 0, 0, 0.7);
    --shadow-sm: 0 2px 10px -2px rgba(0, 0, 0, 0.5);
    --ring: rgba(139, 92, 246, 0.35);
    --scroll: #2c3140;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    min-width: 320px;
    height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    color: var(--text);
    background: var(--bg);
    background-image: var(--bg-grad);
    background-attachment: fixed;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

#app { height: 100%; }

button { font-family: inherit; }

::selection { background: rgba(99, 102, 241, 0.25); }

/* Scrollbars */
.messages::-webkit-scrollbar { width: 8px; }
.messages::-webkit-scrollbar-thumb {
    background: var(--scroll);
    border-radius: 99px;
    border: 2px solid transparent;
    background-clip: content-box;
}
.messages::-webkit-scrollbar-track { background: transparent; }

/* ============================================================================
   Layout
   ========================================================================== */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ---- Header ---- */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: relative;
    z-index: 30;
}

.logo-section {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
}

.logo {
    width: 34px;
    height: 34px;
    flex: none;
    background: var(--gradient);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    box-shadow: 0 6px 16px -6px rgba(99, 102, 241, 0.7);
}
.logo svg { width: 20px; height: 20px; }

.title-wrap { min-width: 0; }
.title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.subtitle {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
}
.subtitle .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
}

/* Icon buttons */
.btn {
    width: 36px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text-muted);
    transition: background .18s var(--ease), color .18s var(--ease), transform .12s var(--ease);
}
.btn svg { width: 18px; height: 18px; }
.btn:hover { background: var(--surface); color: var(--text); }
.btn:active { transform: scale(0.94); }

/* Avatar button */
.avatar-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid transparent;
    background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        var(--gradient) border-box;
    padding: 2px;
    cursor: pointer;
    transition: transform .15s var(--ease), box-shadow .2s var(--ease);
}
.avatar-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px -8px rgba(99,102,241,.8); }
.avatar-btn:active { transform: scale(0.95); }
.avatar {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--gradient);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.02em;
}

/* ============================================================================
   Dropdown menu (user)
   ========================================================================== */
.menu-overlay {
    position: fixed;
    inset: 0;
    z-index: 40;
    background: transparent;
}
.menu {
    position: absolute;
    top: 56px;
    right: 12px;
    width: min(280px, calc(100vw - 24px));
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow);
    z-index: 50;
    overflow: hidden;
    transform-origin: top right;
    animation: pop .18s var(--ease);
}
@keyframes pop {
    from { opacity: 0; transform: translateY(-6px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

.menu-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: var(--gradient-soft);
    border-bottom: 1px solid var(--border);
}
.menu-profile .avatar { width: 42px; height: 42px; font-size: 15px; flex: none; }
.menu-profile .info { min-width: 0; }
.menu-profile .name {
    font-size: 14px; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.menu-profile .meta { font-size: 11px; color: var(--text-muted); }

.menu-section {
    padding: 8px;
    border-bottom: 1px solid var(--border);
}
.menu-section:last-child { border-bottom: none; }
.menu-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-faint);
    padding: 6px 8px 4px;
}

.menu-item {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border: none;
    background: transparent;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    font-size: 13.5px;
    font-weight: 500;
    text-align: left;
    transition: background .15s var(--ease);
}
.menu-item:hover { background: var(--surface); }
.menu-item svg { width: 17px; height: 17px; color: var(--text-muted); flex: none; }
.menu-item .menu-item-text { flex: 1; }
.menu-item .chev { color: var(--text-faint); }
.menu-item.danger { color: #ef4444; }
.menu-item.danger svg { color: #ef4444; }

/* Theme segmented control */
.theme-toggle {
    display: flex;
    gap: 4px;
    padding: 4px;
    margin: 4px 4px 0;
    background: var(--surface);
    border-radius: 12px;
}
.theme-opt {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    border: none;
    background: transparent;
    border-radius: 9px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12.5px;
    font-weight: 600;
    transition: all .18s var(--ease);
}
.theme-opt svg { width: 15px; height: 15px; }
.theme-opt.active {
    background: var(--elevated);
    color: var(--text);
    box-shadow: var(--shadow-sm);
}

/* Language list */
.lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 0 4px 4px;
}
.lang-opt {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 9px;
    cursor: pointer;
    color: var(--text);
    font-size: 12.5px;
    font-weight: 500;
    transition: all .15s var(--ease);
}
.lang-opt .flag { font-size: 15px; }
.lang-opt:hover { background: var(--surface); }
.lang-opt.active {
    background: var(--gradient-soft);
    border-color: color-mix(in srgb, var(--brand-1) 35%, transparent);
    color: var(--text);
    font-weight: 700;
}

/* ============================================================================
   Messages
   ========================================================================== */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
}

/* Welcome / empty state */
.welcome {
    margin: auto 0;
    text-align: center;
    padding: 20px 8px 8px;
    animation: fadeUp .4s var(--ease);
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}
.welcome-icon {
    width: 72px; height: 72px;
    margin: 0 auto 18px;
    background: var(--gradient);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    box-shadow: 0 18px 40px -16px rgba(99, 102, 241, 0.8);
    animation: float 5s ease-in-out infinite;
}
.welcome-icon svg { width: 36px; height: 36px; }
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
}
.welcome-title {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    background: linear-gradient(120deg, var(--text), var(--text-muted));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}
.welcome-text {
    color: var(--text-muted);
    font-size: 13.5px;
    line-height: 1.5;
    max-width: 280px;
    margin: 0 auto 20px;
}

.suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 320px;
    margin: 0 auto;
}
.suggestion {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    background: var(--elevated);
    border-radius: var(--r-md);
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    transition: all .18s var(--ease);
    box-shadow: var(--shadow-sm);
}
.suggestion:hover {
    border-color: color-mix(in srgb, var(--brand-1) 45%, transparent);
    transform: translateY(-2px);
}
.suggestion .s-icon {
    width: 30px; height: 30px; flex: none;
    border-radius: 9px;
    background: var(--gradient-soft);
    color: var(--brand-1);
    display: flex; align-items: center; justify-content: center;
}
.suggestion .s-icon svg { width: 16px; height: 16px; }
.suggestion .s-arrow { margin-left: auto; color: var(--text-faint); }
.suggestion .s-arrow svg { width: 15px; height: 15px; }

/* Message rows */
.message {
    display: flex;
    gap: 10px;
    max-width: 100%;
    animation: msgIn .35s var(--ease);
}
@keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}
.message.user { flex-direction: row-reverse; }

.message-avatar {
    width: 30px; height: 30px;
    flex: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    color: #fff;
    box-shadow: var(--shadow-sm);
}
.message.user .message-avatar { background: linear-gradient(135deg, #0ea5e9, #6366f1); }
.message.assistant .message-avatar { background: var(--gradient); }
.message-avatar svg { width: 16px; height: 16px; }

.message-col {
    display: flex;
    flex-direction: column;
    max-width: calc(100% - 44px);
    min-width: 0;
}
.message.user .message-col { align-items: flex-end; }

.message-meta {
    font-size: 10.5px;
    color: var(--text-faint);
    margin: 0 4px 4px;
    font-weight: 600;
}

.message-bubble {
    padding: 11px 14px;
    border-radius: var(--r-lg);
    font-size: 13.5px;
    line-height: 1.55;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    white-space: pre-wrap;
    box-shadow: var(--shadow-sm);
}
.message.user .message-bubble {
    background: var(--gradient);
    color: #fff;
    border-bottom-right-radius: 5px;
}
.message.assistant .message-bubble {
    background: var(--assistant-bubble);
    color: var(--assistant-text);
    border-bottom-left-radius: 5px;
}
.message-bubble code {
    font-family: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px;
    background: rgba(127, 127, 127, .18);
    padding: 1px 5px;
    border-radius: 5px;
}
.message.user .message-bubble code { background: rgba(255,255,255,.2); }

/* Typing indicator */
.typing-bubble {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 14px 16px;
}
.typing-bubble span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: .5;
    animation: typing 1.3s infinite ease-in-out;
}
.typing-bubble span:nth-child(2) { animation-delay: .18s; }
.typing-bubble span:nth-child(3) { animation-delay: .36s; }
@keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: .4; }
    30% { transform: translateY(-5px); opacity: 1; }
}

/* ============================================================================
   Input
   ========================================================================== */
.input-section {
    padding: 12px 14px 14px;
    border-top: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
}
.input-group {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 6px 6px 6px 14px;
    background: var(--elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-xl);
    transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
}
.input-group:focus-within {
    border-color: var(--brand-1);
    box-shadow: 0 0 0 4px var(--ring);
}
.input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 13.5px;
    line-height: 1.5;
    outline: none;
    resize: none;
    max-height: 140px;
    padding: 8px 0;
    font-family: inherit;
}
.input::placeholder { color: var(--text-faint); }

.send-btn {
    width: 38px; height: 38px;
    flex: none;
    display: flex; align-items: center; justify-content: center;
    background: var(--gradient);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    transition: transform .14s var(--ease), opacity .18s var(--ease), box-shadow .2s var(--ease);
    box-shadow: 0 8px 18px -8px rgba(99, 102, 241, 0.9);
}
.send-btn svg { width: 18px; height: 18px; }
.send-btn:hover:not(:disabled) { transform: translateY(-1px) scale(1.04); }
.send-btn:active:not(:disabled) { transform: scale(0.92); }
.send-btn:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }

.input-hint {
    text-align: center;
    font-size: 10.5px;
    color: var(--text-faint);
    margin-top: 8px;
}

/* ============================================================================
   Setup / Settings (modal + first-run)
   ========================================================================== */
.setup-container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}
.setup-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
}
.setup-form {
    width: 100%;
    max-width: 340px;
    text-align: center;
}
.setup-icon {
    width: 64px; height: 64px;
    margin: 0 auto 18px;
    background: var(--gradient);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    box-shadow: 0 16px 36px -14px rgba(99, 102, 241, 0.8);
}
.setup-icon svg { width: 30px; height: 30px; }
.setup-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 8px;
}
.setup-text {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 22px;
}

.field { text-align: left; margin-bottom: 14px; }
.field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
}
.setup-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--r-md);
    font-size: 13.5px;
    color: var(--text);
    background: var(--elevated);
    outline: none;
    transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
    font-family: inherit;
}
.setup-input::placeholder { color: var(--text-faint); }
.setup-input:focus {
    border-color: var(--brand-1);
    box-shadow: 0 0 0 4px var(--ring);
}

.setup-btn {
    width: 100%;
    padding: 13px;
    background: var(--gradient);
    color: #fff;
    border: none;
    border-radius: var(--r-md);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    transition: transform .14s var(--ease), box-shadow .2s var(--ease), opacity .18s var(--ease);
    box-shadow: 0 12px 26px -12px rgba(99, 102, 241, 0.9);
}
.setup-btn:hover { transform: translateY(-1px); }
.setup-btn:active { transform: scale(0.98); }

.setup-btn.ghost {
    background: transparent;
    color: var(--text-muted);
    box-shadow: none;
    border: 1px solid var(--border-strong);
    margin-top: 10px;
}
.setup-btn.ghost:hover { background: var(--surface); color: var(--text); }

.setup-note {
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    background: var(--surface);
    border-radius: var(--r-md);
    padding: 12px;
    text-align: left;
}

/* Settings modal */
.modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 60;
    background: rgba(8, 9, 14, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn .2s var(--ease);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
    width: 100%;
    max-width: 460px;
    max-height: 92vh;
    overflow-y: auto;
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-xl) var(--r-xl) 0 0;
    box-shadow: var(--shadow);
    animation: slideUp .26s var(--ease);
}
@keyframes slideUp {
    from { transform: translateY(40px); opacity: .6; }
    to   { transform: translateY(0); opacity: 1; }
}
.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--elevated);
}
.modal-title { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; }
.modal-body { padding: 18px; }

/* ============================================================================
   Misc
   ========================================================================== */
.error {
    background: color-mix(in srgb, #ef4444 12%, transparent);
    color: #ef4444;
    padding: 12px;
    border-radius: var(--r-md);
    margin: 12px;
    font-size: 13px;
    border: 1px solid color-mix(in srgb, #ef4444 30%, transparent);
}

/* Initial loading splash */
.splash {

    align-items: center;
    justify-content: center;

.splash .logo { width: 56px; height: 56px; border-radius: 18px; animation: float 4s ease-in-out infinite; }
.splash .logo svg { width: 30px; height: 30px; }

/* ============================================================================
   Responsive — down to 320px
   ========================================================================== */
@media (max-width: 380px) {

}

@media (max-width: 340px) {
