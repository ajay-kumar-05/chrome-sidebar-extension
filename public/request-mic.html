<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enable voice input</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #0b0c10;
        color: #e8e8ef;
      }
      .card {
        width: 100%;
        max-width: 440px;
        background: #14161f;
        border: 1px solid #262a38;
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 30px 80px -40px rgba(0, 0, 0, 0.8);
        text-align: center;
      }
      .badge {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        color: #fff;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 19px;
      }
      p {
        margin: 0 0 18px;
        font-size: 14px;
        line-height: 1.6;
        color: #aeb2c2;
      }
      .status {
        font-weight: 600;
        color: #e8e8ef;
      }
      .status.ok {
        color: #34d399;
      }
      .status.err {
        color: #f87171;
      }
      button {
        appearance: none;
        border: none;
        cursor: pointer;
        padding: 12px 18px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #6366f1, #a855f7);
      }
      button[hidden] {
        display: none;
      }
      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: #757a8c;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" y1="19" x2="12" y2="23" />
          <line x1="8" y1="23" x2="16" y2="23" />
        </svg>
      </div>
      <h1>Enable voice input</h1>
      <p class="status" id="status">Requesting microphone access…</p>
      <button id="retry" hidden>Try again</button>
      <div class="hint" id="hint"></div>
    </main>
    <script src="./request-mic.js"></script>
  </body>
</html>
